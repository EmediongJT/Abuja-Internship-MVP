<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseCheck Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-10 font-sans">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">PulseCheck Dashboard</h1>
            <p class="text-gray-600">Track your Finance & Health in one place.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            
            <!-- Expense Tracker UI -->
            <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-blue-500">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">Expense Tracker</h2>
                <ul id="expense-list" class="mb-4 text-gray-600">
                    <li>No expenses added yet.</li>
                </ul>
                <input type="text" id="expense-input" placeholder="Enter amount..." class="w-full border p-2 rounded mb-2">
                <button onclick="addExpense()" class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">Add Expense</button>
            </div>

            <!-- Health Stats UI -->
            <div class="bg-white p-6 rounded-2xl shadow-md border-l-4 border-green-500">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">Health Stats</h2>
                <p class="text-gray-600 mb-2">Water Intake: <span id="water-count" class="font-bold">0</span> cups</p>
                <button onclick="addWater()" class="w-full bg-green-500 text-white py-2 rounded hover:bg-green-600">Add Water (+1 Cup)</button>
            </div>

        </div>
    </div>

    <script>
        const API_URL = "http://localhost:5000/api";
        let count = 0;

        // Automatically fetch saved data when page loads up
        window.addEventListener('DOMContentLoaded', () => {
            fetchExpenses();
            fetchWater();
        });

        async function fetchExpenses() {
            try {
                const response = await fetch(`${API_URL}/expenses`);
                const expenses = await response.json();
                const list = document.getElementById('expense-list');
                
                if (expenses.length > 0) {
                    list.innerHTML = "";
                    expenses.forEach(item => {
                        const li = document.createElement('li');
                        li.className = "flex justify-between border-b py-2 text-blue-700 font-medium";
                        li.innerHTML = `<span>Expense Item</span> <span>$${item.amount}</span>`;
                        list.appendChild(li);
                    });
                }
            } catch (err) { console.log("Backend offline, using local mode."); }
        }

        async function fetchWater() {
            try {
                const response = await fetch(`${API_URL}/water`);
                const data = await response.json();
                count = data.count || 0;
                updateWaterDisplay();
            } catch (err) { console.log("Backend offline, using local mode."); }
        }

        async function addExpense() {
            const input = document.getElementById('expense-input');
            const list = document.getElementById('expense-list');

            if (input.value.trim() === "") {
                alert("Please enter an amount!");
                return;
            }

            const amountValue = Number(input.value);

            // Optimistic Local Display UI
            if (list.innerHTML.includes("No expenses added yet")) { list.innerHTML = ""; }
            const li = document.createElement('li');
            li.className = "flex justify-between border-b py-2 text-blue-700 font-medium";
            li.innerHTML = `<span>Expense Item</span> <span>$${amountValue}</span>`;
            list.appendChild(li);
            input.value = "";

            // Send to database in background
            try {
                await fetch(`${API_URL}/expenses`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: amountValue })
                });
            } catch (err) { console.log("Saved locally. Run server to sync permanently!"); }
        }

        async function addWater() {
            count++;
            updateWaterDisplay();

            // Send to database in background
            try {
                await fetch(`${API_URL}/water`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ count: count })
                });
            } catch (err) { console.log("Saved locally. Run server to sync permanently!"); }
        }

        function updateWaterDisplay() {
            const waterDisplay = document.getElementById('water-count');
            if (waterDisplay) {
                waterDisplay.innerText = count;
                if (count >= 8) {
                    waterDisplay.classList.add("text-blue-500", "font-bold");
                }
            }
        }
    </script>
</body>
</html>
